name: CI

# Flavour 4 · Cycle 3 — CI/CD pipeline.
# lint + test run on every push and PR; the image is built and pushed to GHCR
# only on push to main (a PR from a fork has no write access to the registry).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read the repo by default; the build job opts into packages:write.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install ruff
        run: pip install -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt
      - name: Install runtime + dev deps
        run: pip install -r requirements.lock -r requirements-dev.txt
      - name: Run unit tests
        run: pytest

  build-and-push:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only publish from the canonical branch — PRs stop after lint+test.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # latest → most recent main; sha-<commit> → immutable pin for k8s.
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (one shared api+worker image)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache → fast rebuilds when only source changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
