# TEMPLATE ONLY — placeholders, safe to commit. Do NOT fill this in and commit it.
#
# The real Secret is created imperatively at apply time from your .env values
# (up.ps1 does this automatically), mirroring the .env.example / .env pattern:
#
#   kubectl -n rec-engine create secret generic rec-engine-secrets `
#     --from-literal=SUPABASE_URL=... `
#     --from-literal=SUPABASE_SERVICE_ROLE_KEY=... `
#     --from-literal=SUPABASE_ANON_KEY=... `
#     --from-literal=OPENAI_API_KEY=... `
#     --from-literal=SUPABASE_JWT_SECRET=...
#
# If you prefer a manifest, copy this to secret.local.yaml (gitignored), fill it in,
# and `kubectl apply -f secret.local.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: rec-engine-secrets
  namespace: rec-engine
type: Opaque
stringData:
  SUPABASE_URL: "https://YOUR-PROJECT.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_ME"
  SUPABASE_ANON_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
  SUPABASE_JWT_SECRET: "REPLACE_ME"
