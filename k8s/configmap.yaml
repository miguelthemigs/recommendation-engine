# Non-secret config, injected via envFrom into both the API and worker pods.
# Secrets (Supabase/OpenAI keys) live in the separate rec-engine-secrets Secret —
# never here. Mirrors the config.py env-var inventory.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rec-engine-config
  namespace: rec-engine
data:
  # In-cluster broker address — reach RabbitMQ by its Service DNS name, not localhost.
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
  # CORS — local dev frontend + the ingress host. Cycle 5 adds the Vercel origin.
  ALLOWED_ORIGINS: "http://localhost:5173,http://rec-engine.local"
  # Honest end-to-end: real OpenAI (Supabase is live), no canned signals.
  MOCK_OPENAI: "false"
  MOCK_OPENAI_DELAY_MS: "2000"
